name: Dispatch Benchmarks Update

on:
  push:
    branches: [main]
    paths:
      - 'data/**'
      - '*.json'
      - '*.txt'

jobs:
  notify-benchmarks:
    name: Trigger Benchmark Update
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch to benchmarks repo
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.PAT_GITHUB }}
          repository: DrAbdulmalek/medical-ocr-benchmarks
          event-type: ground-truth-updated
          client-payload: |
            {
              "ref": "${{ github.sha }}",
              "actor": "${{ github.actor }}",
              "timestamp": "${{ github.event.head_commit.timestamp }}"
            }

  dispatch-training-hub:
    name: Notify Training Hub
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch to training hub
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.PAT_GITHUB }}
          repository: DrAbdulmalek/medical-ocr-training-hub
          event-type: ground-truth-updated
          client-payload: |
            {
              "source": "ground-truth",
              "sha": "${{ github.sha }}"
            }

  notify-platform:
    name: Notify Platform
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch to omni-medical-suite
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.PAT_GITHUB }}
          repository: DrAbdulmalek/omni-medical-suite
          event-type: ground-truth-updated
          client-payload: |
            {
              "source": "ground-truth",
              "sha": "${{ github.sha }}"
            }
