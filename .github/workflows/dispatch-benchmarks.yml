name: Dispatch Benchmarks Update

on:
  push:
    branches: [main]
    paths:
      - 'data/**'
      - '*.json'
      - '*.txt'

jobs:
  notify-benchmarks:
    name: Trigger Benchmark Update
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch to benchmarks repo
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.PAT_GITHUB }}
          repository: DrAbdulmalek/medical-ocr-benchmarks
          event-type: ground-truth-updated
          client-payload: |
            {
              "ref": "${{ github.sha }}",
              "actor": "${{ github.actor }}",
              "timestamp": "${{ github.event.head_commit.timestamp }}"
            }
